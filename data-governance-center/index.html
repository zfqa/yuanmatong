<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>数据中台 - 数据治理中心</title>
    <link rel="stylesheet" href="styles.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body>
    <!-- 顶部全局栏 -->
    <header class="header">
        <div class="header-left">
            <h1 class="logo">
                <i class="fas fa-database"></i>
                数据中台（数据治理中心）
                <span class="subtitle">Data Governance Center</span>
            </h1>
        </div>
        <div class="header-right">
            <div class="metric-item">
                <i class="fas fa-server"></i>
                <span class="metric-label">在线节点</span>
                <span class="metric-value" id="onlineNodes">12</span>
            </div>
            <div class="metric-item">
                <i class="fas fa-hdd"></i>
                <span class="metric-label">今日处理数据</span>
                <span class="metric-value" id="dataProcessed">15.6TB</span>
            </div>
            <div class="metric-item">
                <i class="fas fa-chart-line"></i>
                <span class="metric-label">数据质量评分</span>
                <span class="metric-value quality" id="qualityScore">96.8%</span>
            </div>
            <div class="metric-item status">
                <i class="fas fa-check-circle"></i>
                <span class="metric-label">系统状态</span>
                <span class="metric-value running">运行正常</span>
            </div>
        </div>
    </header>

    <!-- 主内容区域 -->
    <main class="main-content">
        <!-- 左侧菜单栏 -->
        <nav class="sidebar">
            <div class="menu-item active" data-module="1">
                <i class="fas fa-sign-in-alt"></i>
                <span>数据接入中心</span>
            </div>
            <div class="menu-item" data-module="2">
                <i class="fas fa-broom"></i>
                <span>数据清洗中心</span>
            </div>
            <div class="menu-item" data-module="3">
                <i class="fas fa-filter"></i>
                <span>样本筛选中心</span>
            </div>
            <div class="menu-item" data-module="4">
                <i class="fas fa-tags"></i>
                <span>数据标注中心</span>
            </div>
            <div class="menu-item" data-module="5">
                <i class="fas fa-boxes"></i>
                <span>标注训练数据集</span>
            </div>
            <div class="menu-item" data-module="6">
                <i class="fas fa-brain"></i>
                <span>模型状态中心</span>
            </div>
        </nav>

            <!-- 模块六：模型状态中心 -->
            <section class="module" id="module6">
                <div class="module-header">
                    <h2><i class="fas fa-brain"></i> 模型状态中心</h2>
                </div>
                <div class="module-content">
                    <div class="model-status-card">
                        <div class="model-info">
                            <div class="model-name">
                                <i class="fas fa-robot"></i>
                                <span>当前模型</span>
                            </div>
                            <div class="model-id">construction-safety-v1.0</div>
                            <div class="model-state">
                                <span class="state-badge pending">待训练</span>
                            </div>
                        </div>
                        <div class="model-details">
                            <div class="detail-item">
                                <span class="detail-label">数据集</span>
                                <span class="detail-value ready">已准备</span>
                            </div>
                            <div class="detail-item">
                                <span class="detail-label">同步状态</span>
                                <span class="detail-value ready">已连接B节点</span>
                            </div>
                        </div>
                        <button class="btn btn-large btn-primary" onclick="enterTrainingCenter()">
                            <i class="fas fa-arrow-right"></i> 进入模型训练中心
                        </button>
                    </div>
                </div>
            </section>
        </div>
    </main>

    <!-- 数据详情弹窗 -->
    <div class="modal-overlay" id="detailModal">
        <div class="modal-box">
            <div class="modal-header">
                <h3><i class="fas fa-file-alt"></i> 数据详情</h3>
                <button class="modal-close" onclick="closeDetail()">&times;</button>
            </div>
            <div class="modal-body" id="detailContent"></div>
        </div>
    </div>

    <script src="app.js"></script>
</body>
</html>
